name: QualityContol
'on':
  pull_request:
    paths:
    - book/**
    - .github/workflows/qaqc.yaml
    branches:
    - main
env:
  DOCKER_IMAGE: uwhackweek/snowex:2021.09.07
jobs:
  quality-control:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Ensure Clean Notebooks
      continue-on-error: true
      run: 'pip install nb-clean==2.0.2

        find book -name "*ipynb" | xargs nb-clean check --preserve-cell-metadata

        '
    - name: Spellcheck
      continue-on-error: true
      uses: codespell-project/actions-codespell@master
      with:
        skip: .github/workflows/qaqc.yaml,./book/tutorials/geospatial/geospatial_cookbook_rendered.ipynb
        ignore_words_list: hist,MAPE,te
        check_filenames: true
        check_hidden: true
        only_warn: false
    - name: Pull Docker Image
      run: 'docker pull $DOCKER_IMAGE

        docker images

        '
    - name: Disable Notebook Execution
      shell: python
      run: "import yaml\nwith open('./book/_config.yml') as f:\n  data = yaml.safe_load(f)\n\
        \  data['execute']['execute_notebooks'] = 'off'\nwith open('./book/_config.yml',\
        \ 'w') as f:\n  yaml.dump(data, f)\n"
    - name: Check External Links
      run: 'docker run -u root -v ${{ github.workspace }}:/home/jovyan:rw $DOCKER_IMAGE
        jb build book --builder linkcheck

        '
